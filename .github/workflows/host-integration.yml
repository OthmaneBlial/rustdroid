name: host-integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: host-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-integration:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - id: host_suite
        name: Run host runtime and smoke validation
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          avd-name: test_avd
          profile: Nexus 5
          target: google_apis
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -read-only
          script: |
            export RUSTDROID_HOST_TEST_SERIAL=emulator-5554
            export RUSTDROID_HOST_TEST_AVD=test_avd
            export RUSTDROID_CI_HOST_ARTIFACTS_DIR="$RUNNER_TEMP/rustdroid-host"
            export RUSTDROID_SMOKE_ENABLE_GUI=0
            export RUSTDROID_SMOKE_BOOT_TIMEOUT_SECS=360
            cargo build --locked
            ./scripts/ci-host-check.sh

      - name: Upload host artifacts on failure
        if: steps.host_suite.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: host-integration-artifacts
          path: ${{ runner.temp }}/rustdroid-host
          if-no-files-found: ignore

      - id: performance
        name: Check performance baseline
        run: |
          export RUSTDROID_PERF_ARTIFACTS_DIR="$RUNNER_TEMP/rustdroid-performance"
          cargo build --locked
          ./scripts/check-performance-baseline.sh

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-artifacts
          path: ${{ runner.temp }}/rustdroid-performance
          if-no-files-found: ignore

      - name: Write job summary
        if: always()
        run: |
          if [[ -f "${RUNNER_TEMP}/rustdroid-host/results.env" ]]; then
            source "${RUNNER_TEMP}/rustdroid-host/results.env"
          fi
          if [[ -f "${RUNNER_TEMP}/rustdroid-performance/bench.json" ]]; then
            export PERF_BENCH_JSON="$(cat "${RUNNER_TEMP}/rustdroid-performance/bench.json")"
          fi

          {
            echo "## Host Integration"
            echo
            echo "- suite step: ${{ steps.host_suite.outcome }}"
            echo "- integration_host_runtime: ${runtime_status:-not-run}"
            echo "- integration_host_backend: ${backend_status:-not-run}"
            echo "- smoke_matrix: ${smoke_status:-not-run}"
            echo "- performance: ${{ steps.performance.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
