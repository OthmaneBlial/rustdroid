name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - id: fmt
        name: Check formatting
        continue-on-error: true
        run: cargo fmt --check

      - id: clippy
        name: Run clippy
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings

      - id: tests
        name: Run tests
        continue-on-error: true
        run: cargo test

      - id: build
        name: Build debug binary
        continue-on-error: true
        run: cargo build --locked

      - id: shell
        name: Run shell syntax checks
        continue-on-error: true
        run: ./scripts/ci-shell-check.sh

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Fast Checks"
            echo
            echo "- fmt: ${{ steps.fmt.outcome }}"
            echo "- clippy: ${{ steps.clippy.outcome }}"
            echo "- tests: ${{ steps.tests.outcome }}"
            echo "- build: ${{ steps.build.outcome }}"
            echo "- shell: ${{ steps.shell.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.fmt.outcome }}" != "success" || \
                "${{ steps.clippy.outcome }}" != "success" || \
                "${{ steps.tests.outcome }}" != "success" || \
                "${{ steps.build.outcome }}" != "success" || \
                "${{ steps.shell.outcome }}" != "success" ]]; then
            exit 1
          fi

  package-validation:
    runs-on: ubuntu-22.04
    needs: fast-checks

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - id: package
        name: Build and validate release archive
        continue-on-error: true
        run: ./scripts/ci-package-check.sh x86_64-unknown-linux-musl ci

      - name: Upload packaging artifacts on failure
        if: steps.package.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: package-validation-artifacts
          path: |
            dist
          if-no-files-found: ignore

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Package Validation"
            echo
            echo "- package archive validation: ${{ steps.package.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.package.outcome }}" != "success" ]]; then
            exit 1
          fi
